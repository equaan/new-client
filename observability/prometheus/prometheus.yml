# ================================================================
# NewClient1 — Prometheus Configuration
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    client:      'NewClient1'
    environment: 'dev'
    managed_by:  'opt-it-backstage'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alert-rules/*.yml

# ── SCRAPE CONFIGS ───────────────────────────────────────────────

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter — host metrics (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Blackbox Exporter — HTTP endpoint monitoring
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://localhost:80/health  # replace with your app health endpoint
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

$
