# ================================================================
# new-client — Kubernetes Deployment
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-client-app
  namespace: default
  labels:
    app: new-client
    environment: staging
    managed-by: opt-it-backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: new-client
        environment: staging
    spec:
      # Security context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: app
          image: ghcr.io/equaan/new-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP

          # Resource limits — always set to prevent noisy neighbours
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

          # Liveness probe — restarts container if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          # Readiness probe — removes from load balancer if not ready
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          # Environment variables from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: new-client-config
            - secretRef:
                name: new-client-secrets

          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      # Ensure pods spread across nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: new-client
