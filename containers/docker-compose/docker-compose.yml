version: "3.8"

networks:
  app-network:
    driver: bridge

volumes:
  db-data:

services:

  app:
    build:
      context: ../..
      dockerfile: containers/dockerfiles/Dockerfile.nodejs
    container_name: new-client-app
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: "postgresql://appuser:password@db:5432/appdb"
    depends_on:
      db:
        condition: service_healthy
    labels:
      client: new-client
      environment: local
      managed-by: opt-it-backstage

$
  db:
    image: $postgres:15-alpine$
    container_name: new-client-db
    restart: unless-stopped
    networks:
      - app-network
    environment:
$
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: 
$
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
$
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
$
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      client: new-client
      managed-by: opt-it-backstage
$

$
  redis:
    image: redis:7-alpine
    container_name: new-client-redis
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      client: new-client
      managed-by: opt-it-backstage
$
