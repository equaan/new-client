# ================================================================
# NewClient1 — Helm Default Values
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
#
# Override these values per environment:
#   helm install NewClient1 . -f values.prod.yaml
# ================================================================

replicaCount: 1

image:
  repository: ghcr.io/equaan/NewClient1
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: NewClient1-tls
      hosts:
        - app.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
  readiness:
    path: /health
    initialDelaySeconds: 10

env:
  NODE_ENV: dev
  PORT: "3000"

namespace: default
